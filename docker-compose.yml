services:
  palmtop:
    build: .
    volumes:
      - ./config.toml:/app/config.toml:ro
      - palmtop-data:/app/data
    env_file:
      - path: .env
        required: false
    environment:
      # Pass DOTENV_KEY for encrypted secrets (from .env.keys or CI secret)
      - DOTENV_KEY=${DOTENV_KEY:-}
    ports:
      - "8000:8000"
    restart: unless-stopped

volumes:
  palmtop-data:

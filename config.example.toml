# Palmtop configuration
# Copy to config.toml and adjust for your setup.
# Secrets (tokens, API keys) go in .env — encrypt with dotenvx:
#   dotenvx encrypt && dotenvx run -- python -m palmtop
# See .env.example for setup instructions.

# ── Persona — your agent's identity ──────────────────────────────────
# Everything here drives the system prompt, web presence, and email branding.
# Fill this in to make the agent yours.

[persona]
name = "Palmtop"
tagline = "Your AI-powered assistant"
owner_name = "Your Name"              # the human behind the agent
domain = ""                           # your website domain (e.g. "example.com")
booking_url = ""                      # Google Calendar booking link (optional)
linkedin_url = ""                     # LinkedIn profile (optional)
location = "San Francisco"
timezone = "America/Los_Angeles"

# Core personality (injected into system prompt)
personality = """\
You combine sharp analytical thinking with genuine warmth. You're equally \
comfortable reviewing a term sheet, planning someone's week, or brainstorming \
creative strategies. Casual but competent — like texting your most capable friend."""

# What the agent helps with (injected into system prompt)
capabilities = [
    "Scheduling, prioritization, and time management",
    "Business decisions and tradeoff analysis",
    "Research and recommendations",
    "Creative projects and logistics",
]

# What services you offer (for the web chat agent)
services = [
    "Full-stack web apps (Next.js, React, Python, Node)",
    "AI/ML integrations and automation",
    "API design and backend architecture",
    "Technical consulting and architecture reviews",
]

# Brand colors (CSS variables for email template and website)
[persona.brand]
bg = "#0a0a0a"
surface = "#141414"
border = "#2a2a2a"
text = "#e8e8e8"
text_muted = "#888888"
accent = "#f0c040"
accent_dim = "#c49a20"

# Booking links for outreach emails (optional — add as many as you want)
# [[persona.booking]]
# name = "Free Intro Call"
# url = "https://calendar.app.google/your-link"
# desc = "Quick chat to discuss your project"

# ── Channels ─────────────────────────────────────────────────────────
# Single channel (backward compat):
# channel = "telegram"
#
# Multi-channel mode — run multiple channels simultaneously:
# channels = ["telegram", "sms", "email"]
#
# Supported: "telegram", "sms", "email", "discord", "slack", "matrix", "irc",
#            "whatsapp", "xmpp", "scuttlebot".
# All channels share the same AgentLoop (memory, tools, inference).
# Defaults to sms on phone, telegram on dev if neither is set.
#
# SECURITY — authorization fails CLOSED. Each channel exposes the full agent
# (your email, calendar, files, deploys). A channel with no allow-list set
# (allowed_users / allowed_numbers / allowed_jids / allowed_senders) refuses
# ALL inbound messages. To intentionally run a public bot, set allow_anyone =
# true on that channel (logged loudly at startup). Configure the allow-list.
# Telegram channel: uv sync --extra telegram  (bootstrap_termux.sh installs this)

# ── Health / Admin ───────────────────────────────────────────────────
[admin]
enabled = true         # /health endpoint for Docker healthcheck + uptime monitors
# token = ""          # Set a bearer token to enable /admin/stats (empty = disabled)
# host = "127.0.0.1"  # SECURITY: loopback by default — /health is unauthenticated
#                     # and leaks uptime/channels/DB sizes. The in-container Docker
#                     # HEALTHCHECK still works (localhost). Set "0.0.0.0" to expose
#                     # to the LAN / external uptime monitors (and set a token).
# port = 8000         # Shares port with web channel if both are enabled

[inference]
model_path = "models/phi-3.5-mini-instruct-q4_k_m.gguf"
n_ctx = 4096
n_gpu_layers = -1   # -1 = offload all to GPU (Metal on Mac, Vulkan on phone)
n_threads = 4

# Cloud tiers — local model routes messages to the right tier automatically.
# Set the env var for your provider (see below). With both Anthropic + Google:
# light defaults to Google (cheap), heavy to Anthropic (capable).
#
# Supported providers:
#   anthropic  — Claude (ANTHROPIC_API_KEY)
#   google     — Gemini (GOOGLE_API_KEY)
#   openai     — GPT-4o, o3 (OPENAI_API_KEY)
#   groq       — Fast Llama/Mixtral (GROQ_API_KEY)
#   together   — Open-source models (TOGETHER_API_KEY)
#   fireworks  — Fast open-source (FIREWORKS_API_KEY)
#   deepseek   — DeepSeek-V3/R1 (DEEPSEEK_API_KEY)
#   mistral    — Mistral Large (MISTRAL_API_KEY)
#   openrouter — 100+ models, one key (OPENROUTER_API_KEY)
#   ollama     — Local via HTTP, no key needed (OLLAMA_BASE_URL)
#   cohere     — Command R+ (COHERE_API_KEY)

[cloud.light]
# provider = "google"                   # or "anthropic", "groq", "ollama", etc.
# model = "gemini-2.5-flash"            # default for google
# model = "claude-haiku-4-5-20251001"   # default for anthropic
# model = "gpt-4o-mini"                 # default for openai
# model = "llama-3.3-70b-versatile"     # default for groq

[cloud.heavy]
# provider = "anthropic"                # or "openai", "deepseek", "openrouter", etc.
# model = "claude-sonnet-4-5-20250514"  # default for anthropic
# model = "gpt-4o"                      # for openai
# model = "deepseek-chat"              # for deepseek

[search]
# Fallback chain: tries providers in order, DuckDuckGo is always the final fallback.
# Multiple keys per provider rotate automatically. Set via env vars:
#   BRAVE_API_KEYS="key1,key2,key3"   (2,000 free queries/month per key)
#   SERPER_API_KEYS="key1,key2,key3"  (2,500 free queries/month per key)
# Or list them here:
# brave_keys = ["key1", "key2"]
# serper_keys = ["key1", "key2"]
# preferred_order = ["serper", "brave"]  # default: serper → brave → duckduckgo

[telegram]
# Set TELEGRAM_BOT_TOKEN env var instead of putting it here
# bot_token = ""
# allowed_users = []          # Telegram user IDs; empty = refuse everyone (fail closed)
# allow_anyone = false        # set true ONLY to accept messages from any user

[discord]
# Set DISCORD_BOT_TOKEN env var instead of putting it here
# bot_token = ""
# allowed_users = []     # Discord user IDs (integers)
# guild_id = 0           # restrict to one server (0 = any)
# channel_id = 0         # restrict to one text channel (0 = any, DMs always work)

[slack]
# Socket Mode — no public URL needed (perfect for self-hosted).
# Set SLACK_BOT_TOKEN and SLACK_APP_TOKEN env vars instead of putting them here.
# bot_token = "xoxb-..."        # Bot User OAuth Token
# app_token = "xapp-..."        # App-Level Token (Socket Mode)
# allowed_users = []             # Slack user IDs (strings, e.g. "U12345ABC")

[matrix]
# Works with matrix.org and self-hosted homeservers (Synapse, Conduit, etc.)
# Set MATRIX_HOMESERVER, MATRIX_USER_ID, MATRIX_ACCESS_TOKEN env vars.
# homeserver = "https://matrix.org"
# user_id = "@palmtop:matrix.org"
# access_token = ""
# allowed_users = []             # Matrix user IDs (e.g. "@alice:matrix.org")
# allowed_rooms = []             # Room IDs (e.g. "!abc123:matrix.org")

[irc]
# Zero extra dependencies — uses raw asyncio sockets with IRC protocol.
# server = "irc.libera.chat"
# port = 6697
# nick = "palmtop"
# channels = ["#your-channel"]
# password = ""                  # server password (optional)
# use_ssl = true
# allowed_users = []             # IRC nicks (case-insensitive)

[whatsapp]
# Official WhatsApp Business Cloud API.
# Free tier: 1,000 service conversations/month.
# Set env vars or fill values below:
#   WHATSAPP_PHONE_NUMBER_ID, WHATSAPP_ACCESS_TOKEN, WHATSAPP_VERIFY_TOKEN
# phone_number_id = ""
# access_token = ""
# verify_token = ""              # for webhook verification challenge
# app_secret = ""                # REQUIRED — without it, inbound webhooks are rejected
#                                # (can't verify the request actually came from Meta)
# allowed_numbers = ["+1234567890"]
# webhook_port = 8080
# webhook_path = "/webhook/whatsapp"

[xmpp]
# XMPP/Jabber — works with Prosody, ejabberd, or any XMPP server.
# Requires: uv sync --extra xmpp (installs slixmpp).
# Set XMPP_JID and XMPP_PASSWORD env vars or fill below.
# jid = "palmtop@your-server.org"
# password = ""
# allowed_jids = ["you@your-server.org"]
# mucs = ["room@conference.your-server.org"]  # MUC rooms to join
# muc_nick = "palmtop"

[scuttlebot]
# Multi-agent coordination via ScuttleBot IRC backplane.
# See: https://github.com/ConflictHQ/scuttlebot
# Zero extra dependencies — uses raw asyncio IRC protocol.
# server = "localhost"
# port = 6667
# nick = "palmtop"
# channels = ["#ops", "#engineering"]
# password = ""
# use_ssl = false
# broadcast_tools = true         # stream tool calls to coordination channels

[email]
# AgentMail — gives the agent his own email inbox
# api_key = "am_..."           # or set AGENTMAIL_API_KEY env var
# inbox_id = "inbox_..."       # optional — auto-detects first inbox if empty
                                # or set AGENTMAIL_INBOX_ID env var
# As a tool: the agent can read/send email at any time.
# As a channel: add "email" to channels = [...] for inbound email routing.
# poll_interval = 30            # seconds between inbox checks (channel mode)
# allowed_senders = []          # inbound: exact From addresses; empty = refuse everyone (fail closed)
# allow_anyone = false          # inbound: set true ONLY to accept mail from any sender
# allowed_recipients = []       # OUTBOUND tool: addresses or bare domains the agent may
#                               # email via [TOOL:email] send/forward; empty = allow all.
#                               # Guards prompt-injection exfil/spam (lead outreach is separate).

[atlassian]
# domain = "yourcompany.atlassian.net"
# email = "you@example.com"
# Or set ATLASSIAN_DOMAIN, ATLASSIAN_EMAIL, ATLASSIAN_API_TOKEN env vars

# MCP servers — the agent connects as a client (lazy, on first tool use)
# If an MCP server fails, the agent falls back to built-in REST tools when available.
#
# SECURITY: an MCP server is a TRUSTED process — its `command` runs locally and
# its output is fed to the agent. Only add servers you trust. As of #49 the
# subprocess gets a least-privilege environment (a safe baseline like PATH/HOME,
# NOT your API keys) plus whatever you put in its `env` below — so grant each
# server only the secrets it actually needs.
#
# Atlassian MCP (built-in, pure Python — no Rust/Node.js):
#   pip install palmtop[atlassian]
# The [atlassian] config above auto-maps to the env vars the MCP server needs.
#
# [[mcp.servers]]
# name = "atlassian"
# description = "Jira and Confluence — search issues, manage tickets, read wiki pages"
# command = ["python", "-m", "palmtop.mcp.atlassian_server"]
#
# [[mcp.servers]]
# name = "custom-kb"
# description = "Custom knowledge base server"
# command = ["python", "-m", "palmtop.mcp.server"]

# 12 Week Year (12WY Reports on Railway) — built-in REST gateway, no extra deps.
# Set env vars on the S21 (recommended) or fill [twelvewy] below:
#   TWELVEWY_API_BASE_URL  — Railway APP_URL — MUST be https:// (the API key is
#                            sent as a bearer token; non-https is refused)
#   TWELVEWY_API_KEY       — from: uv run python scripts/create_api_key.py (in 12wy repo)
#
# [twelvewy]
# api_base_url = "https://your-app.up.railway.app"
# api_key = "twy_..."              # prefer TWELVEWY_API_KEY env var

[observability]
# Trace every conversation turn, tool call, and LLM generation
enabled = true
backend = "sqlite"     # "sqlite" (zero deps, traces.db) or "langfuse" (cloud)
# Langfuse needs: LANGFUSE_PUBLIC_KEY, LANGFUSE_SECRET_KEY, LANGFUSE_BASE_URL

[digest]
enabled = true
hour = 7          # 7:00 AM in your timezone
minute = 0

timezone = "America/Los_Angeles"
data_dir = "data"

# 12WY goal alignment — copy docs/plans/twy_goals.example.json to either:
#   docs/plans/twy_goals.json          (core engine default)
#   data/docs/plans/twy_goals.json     (telegram/sms agent via data_dir)
# Each goal needs "tag" and "title"; hybrid heuristic + Ollama semantic judge.

[alignment]
mode = "soft"           # "soft" = warn and continue; "hard" = refuse misaligned tasks
# goals_path = ""       # empty = auto-resolve docs/plans then data/docs/plans
use_semantic = true     # Ollama judges tasks that fail keyword match (localhost:11434)

# ── Owner identity ───────────────────────────────────────────────────
# The engine: / cursor: commands run autonomous tasks and cloud code
# execution — far more powerful than a normal chat. They are restricted to
# the owner(s) listed here, regardless of which channel admits the sender.
# IDs are channel-qualified (the same form channels log for a sender):
#   telegram:<numeric user id>   sms:+<E.164 number>   slack:U0123   discord:<id>
# When set, owners also gate who may /approve or /deny a pending action — an
# action can't be self-approved by just any admitted user.
# SECURITY: if this list is empty, engine: / cursor: are refused on EVERY
# channel (fail closed), and /approve falls back to the channel allow-list.
[agent]
owners = []
# owners = ["telegram:123456789", "sms:+15551234567"]

# Sovereign engine — the agent can trigger it from chat (owners only):
#   /engine draft poster copy        (Telegram)
#   /claude draft poster copy        (Telegram alias — same as /engine)
#   engine: draft poster copy        (Telegram or SMS)
#   claude: draft poster copy        (alias)
# Headless CLI (no interactive channel) — autonomous is below the safety floor,
# so the operator must opt in (see .env.example "Safety floor"):
#   PALMTOP_ALLOW_AUTONOMOUS=1 PALMTOP_AUTONOMOUS=1 uv run python -m palmtop.engine --task "your task"

[engine]
enabled = true   # uses cloud backends (ANTHROPIC_API_KEY or GOOGLE_API_KEY)

# Cursor Cloud Agents — the agent delegates repo work to Cursor VMs:
#   /cursor fix the failing tests in src/utils.py     (Telegram)
#   cursor: add README setup section                  (Telegram or SMS)
#   [TOOL:cursor] refactor auth module                (from the reply)
# Set CURSOR_API_KEY (user key from cursor.com/dashboard or team service account).
#
# [cursor]
# enabled = true
# allowed_repos = ["https://github.com/your-org/your-repo"]
# default_repo = "https://github.com/your-org/your-repo"
# default_branch = "main"
# max_concurrent = 1
# require_blessing = true   # Telegram /approve before launch
# poll_interval_s = 30
# timeout_s = 3600
# auto_create_pr = true

# Vercel — deploy linked Git projects (production or preview):
#   [TOOL:vercel] deploy main
#   [TOOL:vercel] status
# Set VERCEL_TOKEN (vercel.com/account/tokens). Project IDs from dashboard → Settings.
#
# [vercel]
# enabled = true
# default_project_id = "prj_xxxxxxxx"
# default_project_name = "my-app"   # optional fallback if id omitted
# default_target = "production"   # or "preview"
# default_branch = "main"
# team_id = ""                    # optional Vercel team
# require_blessing = true

# Railway — redeploy a configured service (GraphQL API, no CLI on Termux):
#   [TOOL:railway] deploy
#   [TOOL:railway] deployments
# Set RAILWAY_TOKEN (railway.app/account/tokens — prefer "No Team" token for API).
# Copy project/service/environment IDs from the Railway dashboard URL or API.
#
# [railway]
# enabled = true
# default_project_id = "xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx"
# default_service_id = "xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx"
# default_environment_id = "xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx"
# require_blessing = true

# --- Voice (Telegram voice messages → transcription → response) ---
# Default: Gemini Flash transcribes audio using your existing GOOGLE_API_KEY.
# If whisper.cpp + ffmpeg are installed, it auto-falls back to local STT offline.
# No extra setup needed if you already have GOOGLE_API_KEY set.
#
# Optional local fallback: pkg install whisper-cpp ffmpeg
# Model: wget -P models/ https://huggingface.co/ggerganov/whisper.cpp/resolve/main/ggml-base.en.bin
[voice]
enabled = false
stt_provider = "gemini"             # "gemini" (default), "whisper_cpp" (local), "openai"
stt_model_path = "models/ggml-base.en.bin"   # whisper.cpp fallback model
# stt_api_key = ""                  # auto-filled from GOOGLE_API_KEY for gemini
tts_enabled = false                 # voice replies via Gemini TTS
tts_provider = "gemini"             # "gemini" (default) or "openai"
tts_voice = "Kore"                  # Gemini voices: Kore, Puck, Charon, Fenrir, Aoede, Leda, Orus, Zephyr

# --- SMS / RCS on the S21 (Termux:API, dual-channel with Telegram) ---
[sms]
enabled = false
allowed_numbers = ["+15551234567"]       # authorized senders; empty = refuse everyone (fail closed)
# RCS notifications carry a display name, not a number. The sender's number is
# resolved (from the title or your device contacts) and checked against
# allowed_numbers — the display name alone never authorizes. allowed_sender_names
# only helps map a known contact name to its number for replies.
allowed_sender_names = []
allow_anyone = false          # set true ONLY to accept SMS/RCS from any number
poll_interval = 5

# --- Proactive monitoring — the agent reaches out when something changes ---
[monitor]
enabled = true
calendar_interval_minutes = 10      # how often to check for moved/new/cancelled events
plans_interval_hours = 12           # how often to check for stale plans
email_interval_minutes = 15         # how often to check for new emails
jira_interval_minutes = 30          # how often to check for new Jira assignments
stale_plan_days = 3                 # alert if a plan hasn't been updated in N days
alert_cooldown_hours = 2            # don't repeat the same alert within N hours
quiet_hours_start = 22              # 10 PM — hold alerts until morning
quiet_hours_end = 7                 # 7 AM
email_auto_reply = false            # auto-reply to threads the agent participated in
